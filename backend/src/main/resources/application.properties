# Application Name
spring.application.name=AdvisorEvaluationSystem

# Load optional local env files (KEY=VALUE) for development.
# Works when running from either the repo root or the backend/ folder.
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/adviser_evaluation_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.sql.init.mode=always
# spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
server.error.include-message=always

# ============================================
# MULTIPART FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.group9.advisor_eval_system=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=86400000

# ============================================
# GOOGLE OAUTH CONFIGURATION
# ============================================
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:3000/profile/google-callback}

# ============================================
# GEMINI AI CONFIGURATION
# ============================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-3-flash-preview}
