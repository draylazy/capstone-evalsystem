# Application Name
spring.application.name=AdvisorEvaluationSystem

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/adviser_evaluation_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.defer-datasource-initialization=true

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=${PORT:8080}
server.error.include-message=always

# ============================================
# MULTIPART FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.group9.advisor_eval_system=INFO
logging.level.org.springframework.web=INFO

# ============================================
# JWT CONFIGURATION
# ============================================
# IMPORTANT: Generate a secure random key for production!
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=86400000

# ============================================
# GOOGLE OAUTH CONFIGURATION
# ============================================
# Get these from: https://console.cloud.google.com/apis/credentials
google.client.id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:3000/profile/google-callback}

# ============================================
# GEMINI AI CONFIGURATION
# ============================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.version=${GEMINI_API_VERSION:v1}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
